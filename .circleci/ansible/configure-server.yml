---
- name: "Install dependencies"
  hosts: all
  user: ubuntu
  gather_facts: false
  become: yes
  pre_tasks:
    - name: "install node 13.X"
      shell: |
        curl -sL https://deb.nodesource.com/setup_13.x | sudo -E bash -
        sudo apt -y upgrade
        sudo apt install -y nodejs

    - name: "Install zip utility."
      apt:
        name: [ "zip", "unzip" ]
        state: latest
        update_cache: yes

  roles:
    - install-kubectl

- name: "Fetch kubectl config"
  hosts: all
  user: ubuntu
  gather_facts: false

  become: yes
  vars:
    AWS_DEFAULT_REGION: "{{ lookup('env', 'AWS_DEFAULT_REGION') }}"
    ENVIRONMENT_NAME: "{{ lookup('env', 'ENVIRONMENT_NAME') }}"
    CIRCLE_WORKFLOW_ID: "{{ lookup('env', 'CIRCLE_WORKFLOW_ID') }}"
  pre_tasks:
    - name: Create a kubeconfig file for the cluster
      shell: "aws eks update-kubeconfig --region {{ AWS_DEFAULT_REGION }} --name {{ ENVIRONMENT_NAME }}-cluster-${{ CIRCLE_WORKFLOW_ID:0:7 }}"