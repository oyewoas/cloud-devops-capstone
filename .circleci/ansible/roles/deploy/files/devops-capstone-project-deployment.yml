apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-capstone-project-deployment
  labels:
    app: devops-capstone-project-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: devops-capstone-project-app
  template:
    metadata:
      labels:
        app: devops-capstone-project-app
    spec:
      containers:
        - name: devops-capstone-project-app
          image: oyewoas/devops-capstone-project
          ports:
            - containerPort: 80