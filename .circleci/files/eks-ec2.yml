Description: >
  Ayooluwa Oyewo Starwars Directory to create two hosts to manage the EKS-Cluster
Parameters:
  WorkflowID:
    Description: Unique identifier.
    Type: String
  EnvironmentName:
    Description: An Environment name that will be prefixed to resources
    Default: starwars-directory
    Type: String
  SSHKeyName:
    Description: SSH key for instance access
    Default: mykeypair
    Type: String
  amiImageId:
    Description: Defines the Image-ID of the OS to deploy
    Default: ami-0dfcb1ef8550277af
    Type: String

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-SG-${WorkflowID}
      GroupDescription: Allow port 22 80 443 for instance
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: !Ref SSHKeyName
      ImageId: !Ref amiImageId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-mgt-${WorkflowID}
        - Key: Project
          Value: !Ref EnvironmentName

